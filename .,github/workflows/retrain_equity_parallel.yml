name: Daily Retrain - Equity Universe (Parallel)

on:
  schedule:
    # Run at 5:00 PM EST (22:00 UTC) on weekdays
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      benchmark:
        description: 'Run benchmark only (no HF write)'
        type: boolean
        default: false
      epochs:
        description: 'Override max epochs'
        type: number
        default: 80

jobs:
  # Matrix job: runs expanding and shrinking in parallel
  train-equity-stream:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      matrix:
        stream: [expanding, shrinking]
      fail-fast: false  # If one stream fails, still run the other

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Train Equity Universe - ${{ matrix.stream }} Stream
      if: ${{ !inputs.benchmark }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        echo "🚀 Training Equity universe - ${{ matrix.stream }} stream"
        python train.py --universe equity --stream ${{ matrix.stream }} --epochs ${{ inputs.epochs || 80 }}

    - name: Benchmark Mode - ${{ matrix.stream }}
      if: ${{ inputs.benchmark }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        echo "⏱️ Benchmarking Equity universe - ${{ matrix.stream }} stream"
        python train.py --universe equity --stream ${{ matrix.stream }} --benchmark --epochs ${{ inputs.epochs || 80 }}

    - name: Verify HF Upload - ${{ matrix.stream }}
      if: ${{ !inputs.benchmark }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        STREAM: ${{ matrix.stream }}
      run: |
        python -c "
        from huggingface_hub import HfApi
        from datetime import datetime, timezone, timedelta
        import time

        api = HfApi(token='$HF_TOKEN')

        # Retry a few times in case of eventual consistency
        for attempt in range(5):
            try:
                info = api.dataset_info('P2SAMAPA/p2-etf-vlstm-outputs')
                files = api.list_repo_files('P2SAMAPA/p2-etf-vlstm-outputs', repo_type='dataset')

                expected_file = f'equity_{'$STREAM'}_latest.json'

                if expected_file in files:
                    print(f'✅ {expected_file} found in dataset')
                    exit(0)
                else:
                    print(f'⏳ Attempt {attempt + 1}: {expected_file} not yet visible, waiting...')
                    time.sleep(2)
            except Exception as e:
                print(f'⚠️ Attempt {attempt + 1} failed: {e}')
                time.sleep(2)

        print(f'❌ Failed to verify {expected_file} after 5 attempts')
        exit(1)
        "

  # Optional: Final verification job that runs after both streams complete
  verify-equity-complete:
    runs-on: ubuntu-latest
    needs: train-equity-stream  # Waits for both matrix jobs to complete
    if: ${{ !inputs.benchmark }}

    steps:
    - name: Verify Both Equity Streams Complete
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python -c "
        from huggingface_hub import HfApi
        api = HfApi(token='$HF_TOKEN')

        files = api.list_repo_files('P2SAMAPA/p2-etf-vlstm-outputs', repo_type='dataset')

        required = ['equity_expanding_latest.json', 'equity_shrinking_latest.json']
        found = [f for f in required if f in files]

        print(f'Found files: {found}')

        if len(found) == 2:
            print('✅ Both Equity streams completed successfully')
            exit(0)
        else:
            missing = [f for f in required if f not in files]
            print(f'❌ Missing files: {missing}')
            exit(1)
        "
