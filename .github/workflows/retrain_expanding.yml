name: Retrain — Expanding Stream

on:
  schedule:
    # 21:30 UTC Sunday = before Monday market open
    - cron: '30 21 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force retrain even if already ran today (true/false)'
        required: false
        default: 'false'
      benchmark:
        description: 'Run benchmark timing only (true/false)'
        required: false
        default: 'false'
      epochs:
        description: 'Max training epochs'
        required: false
        default: '80'

jobs:
  train_expanding:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if already ran today
        if: ${{ github.event.inputs.force != 'true' && github.event.inputs.benchmark != 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          RESULT=$(python check_run_date.py --stream expanding)
          echo "Date check result: $RESULT"
          if [ "$RESULT" = "ALREADY_RAN_TODAY" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Train expanding stream
        if: ${{ env.SKIP != 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.benchmark }}" = "true" ]; then
            echo "🔬 Running benchmark mode..."
            python train.py --benchmark --epochs ${{ github.event.inputs.epochs || '80' }}
          else
            echo "📈 Training expanding stream..."
            python train.py --stream expanding --epochs ${{ github.event.inputs.epochs || '80' }}
          fi

      - name: Report completion
        if: always()
        run: |
          if [ "${{ env.SKIP }}" = "true" ]; then
            echo "⏭️  Skipped — already ran today"
          else
            echo "✅ Expanding stream finished at $(date -u)"
          fi
