name: Retrain — Expanding Stream

on:
  schedule:
    # 21:30 UTC Sunday = before Monday market open
    - cron: '30 21 * * 0'
  workflow_dispatch:
    inputs:
      universe:
        description: 'ETF universe (fi, equity, or both)'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - fi
          - equity
      force:
        description: 'Force retrain even if already ran today (true/false)'
        required: false
        default: 'false'
      benchmark:
        description: 'Run benchmark timing only (true/false)'
        required: false
        default: 'false'
      epochs:
        description: 'Max training epochs'
        required: false
        default: '80'

jobs:
  train_expanding_fi:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: ${{ (github.event_name == 'schedule') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.universe == 'fi' || github.event.inputs.universe == 'both')) }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt

      # FIX: always initialise SKIP=false so the training step condition is
      # never undefined. Without this, on scheduled runs where the date-check
      # step is skipped entirely, env.SKIP is empty — not 'false' — and
      # `env.SKIP != 'true'` can behave unexpectedly across runner versions.
      - name: Set SKIP default
        run: echo "SKIP=false" >> $GITHUB_ENV

      # FIX: only run the date-check on manual dispatch, never on schedule.
      # On schedule we always want to train. Previously the condition only
      # checked force/benchmark inputs, which are empty strings on schedule —
      # so the step ran and could set SKIP=true if today's date was already
      # in the HF file, blocking the upload silently.
      - name: Check if already ran today (FI)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force != 'true' && github.event.inputs.benchmark != 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          RESULT=$(python check_run_date.py --stream expanding --universe fi)
          echo "Date check result: $RESULT"
          if [ "$RESULT" = "ALREADY_RAN_TODAY" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Train expanding stream (FI)
        if: ${{ env.SKIP != 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.benchmark }}" = "true" ]; then
            echo "🔬 Benchmark mode (FI)..."
            python train.py --universe fi --benchmark --epochs ${{ github.event.inputs.epochs || '80' }}
          else
            echo "📈 Training expanding stream (FI)..."
            python train.py --universe fi --stream expanding --epochs ${{ github.event.inputs.epochs || '80' }}
          fi

      - name: Report completion (FI)
        if: always()
        run: |
          if [ "${{ env.SKIP }}" = "true" ]; then
            echo "⏭️  Skipped FI — already ran today"
          else
            echo "✅ Expanding stream (FI) finished at $(date -u)"
          fi

  train_expanding_equity:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: ${{ (github.event_name == 'schedule') || (github.event_name == 'workflow_dispatch' && (github.event.inputs.universe == 'equity' || github.event.inputs.universe == 'both')) }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Set SKIP default
        run: echo "SKIP=false" >> $GITHUB_ENV

      - name: Check if already ran today (Equity)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force != 'true' && github.event.inputs.benchmark != 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          RESULT=$(python check_run_date.py --stream expanding --universe equity)
          echo "Date check result: $RESULT"
          if [ "$RESULT" = "ALREADY_RAN_TODAY" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Train expanding stream (Equity)
        if: ${{ env.SKIP != 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.benchmark }}" = "true" ]; then
            echo "🔬 Benchmark mode (Equity)..."
            python train.py --universe equity --benchmark --epochs ${{ github.event.inputs.epochs || '80' }}
          else
            echo "📈 Training expanding stream (Equity)..."
            python train.py --universe equity --stream expanding --epochs ${{ github.event.inputs.epochs || '80' }}
          fi

      - name: Report completion (Equity)
        if: always()
        run: |
          if [ "${{ env.SKIP }}" = "true" ]; then
            echo "⏭️  Skipped Equity — already ran today"
          else
            echo "✅ Expanding stream (Equity) finished at $(date -u)"
          fi
