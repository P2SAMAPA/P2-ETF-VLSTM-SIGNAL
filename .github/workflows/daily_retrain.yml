name: Weekly VLSTM Retrain

on:
  schedule:
    # 21:30 UTC Sunday = before Monday market open
    # 3-year windows x 12 windows x 4 models ~ 410 min per run
    # Weekly cadence keeps usage within GitHub Actions free tier (~1,640 min/month)
    - cron: '30 21 * * 0'
  workflow_dispatch:
    inputs:
      benchmark:
        description: 'Run benchmark timing only (true/false)'
        required: false
        default: 'false'
      epochs:
        description: 'Max training epochs'
        required: false
        default: '80'

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 480       # 8 hour hard cap

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training (or benchmark)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.benchmark }}" = "true" ]; then
            echo "🔬 Running benchmark mode..."
            python train.py --benchmark --epochs ${{ github.event.inputs.epochs || '80' }}
          else
            echo "🚀 Running full training..."
            python train.py --epochs ${{ github.event.inputs.epochs || '80' }}
          fi

      - name: Report completion
        if: always()
        run: echo "✅ Workflow finished at $(date -u)"
