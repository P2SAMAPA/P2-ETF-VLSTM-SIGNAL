name: Equity Train

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      benchmark:
        type: boolean
        default: false
      epochs:
        type: number
        default: 80

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      matrix:
        stream: [expanding, shrinking]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Train Equity
        if: github.event.inputs.benchmark != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          export STREAM=${{ matrix.stream }}
          export EPOCHS=${{ github.event.inputs.epochs || '80' }}
          python train.py --universe equity --stream $STREAM --epochs $EPOCHS
      - name: Benchmark Equity
        if: github.event.inputs.benchmark == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          export STREAM=${{ matrix.stream }}
          export EPOCHS=${{ github.event.inputs.epochs || '80' }}
          python train.py --universe equity --stream $STREAM --benchmark --epochs $EPOCHS
