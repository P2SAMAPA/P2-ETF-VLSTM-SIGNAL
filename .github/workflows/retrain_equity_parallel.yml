name: Daily Retrain Equity Parallel

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      benchmark:
        description: 'Run benchmark only'
        type: boolean
        default: false
      epochs:
        description: 'Override max epochs'
        type: number
        default: 80

jobs:
  train-equity:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        stream: [expanding, shrinking]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Train Equity
        if: ${{ !inputs.benchmark }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train.py --universe equity --stream ${{ matrix.stream }} --epochs ${{ inputs.epochs || 80 }}
      - name: Benchmark Equity
        if: ${{ inputs.benchmark }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train.py --universe equity --stream ${{ matrix.stream }} --benchmark --epochs ${{ inputs.epochs || 80 }}
n.py --universe equity --stream ${{ matrix.stream }} --benchmark --epochs ${{ inputs.epochs || 80 }}
