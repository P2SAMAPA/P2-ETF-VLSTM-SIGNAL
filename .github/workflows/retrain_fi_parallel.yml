name: Daily Retrain - FI Universe (Parallel)

on:
  schedule:
    # Run at 4:30 PM EST (21:30 UTC) on weekdays
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      benchmark:
        description: 'Run benchmark only (no HF write)'
        type: boolean
        default: false
      epochs:
        description: 'Override max epochs'
        type: number
        default: 80

jobs:
  # Matrix job: runs expanding and shrinking in parallel
  train-fi-stream:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      matrix:
        stream: [expanding, shrinking]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Train FI Universe - ${{ matrix.stream }} Stream
      if: ${{ !inputs.benchmark }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        echo "🚀 Training FI universe - ${{ matrix.stream }} stream"
        python train.py --universe fi --stream ${{ matrix.stream }} --epochs ${{ inputs.epochs || 80 }}

    - name: Benchmark Mode - ${{ matrix.stream }}
      if: ${{ inputs.benchmark }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        echo "⏱️ Benchmarking FI universe - ${{ matrix.stream }} stream"
        python train.py --universe fi --stream ${{ matrix.stream }} --benchmark --epochs ${{ inputs.epochs || 80 }}

    - name: Verify HF Upload - ${{ matrix.stream }}
      if: ${{ !inputs.benchmark }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        STREAM: ${{ matrix.stream }}
      run: |
        python3 << 'EOF'
        import os
        from huggingface_hub import HfApi
        import time

        api = HfApi(token=os.environ['HF_TOKEN'])
        stream = os.environ['STREAM']
        expected_file = f'fi_{stream}_latest.json'

        for attempt in range(5):
            try:
                files = api.list_repo_files('P2SAMAPA/p2-etf-vlstm-outputs', repo_type='dataset')
                if expected_file in files:
                    print(f'✅ {expected_file} found in dataset')
                    exit(0)
                else:
                    print(f'⏳ Attempt {attempt + 1}: {expected_file} not yet visible, waiting...')
                    time.sleep(2)
            except Exception as e:
                print(f'⚠️ Attempt {attempt + 1} failed: {e}')
                time.sleep(2)

        print(f'❌ Failed to verify {expected_file} after 5 attempts')
        exit(1)
        EOF

  verify-fi-complete:
    runs-on: ubuntu-latest
    needs: train-fi-stream
    if: ${{ !inputs.benchmark }}

    steps:
    - name: Verify Both FI Streams Complete
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python3 << 'EOF'
        from huggingface_hub import HfApi
        import os

        api = HfApi(token=os.environ['HF_TOKEN'])
        files = api.list_repo_files('P2SAMAPA/p2-etf-vlstm-outputs', repo_type='dataset')

        required = ['fi_expanding_latest.json', 'fi_shrinking_latest.json']
        found = [f for f in required if f in files]

        print(f'Found files: {found}')

        if len(found) == 2:
            print('✅ Both FI streams completed successfully')
            exit(0)
        else:
            missing = [f for f in required if f not in files]
            print(f'❌ Missing files: {missing}')
            exit(1)
        EOF
