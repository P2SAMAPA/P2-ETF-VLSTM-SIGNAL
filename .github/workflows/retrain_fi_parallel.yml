name: Daily Retrain FI Parallel

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      benchmark:
        description: 'Run benchmark only'
        type: boolean
        default: false
      epochs:
        description: 'Override max epochs'
        type: number
        default: 80

jobs:
  train-fi:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        stream: [expanding, shrinking]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Train FI
        if: inputs.benchmark == false
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          STREAM: ${{ matrix.stream }}
          EPOCHS: ${{ inputs.epochs || 80 }}
        run: python train.py --universe fi --stream $STREAM --epochs $EPOCHS
      - name: Benchmark FI
        if: inputs.benchmark == true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          STREAM: ${{ matrix.stream }}
          EPOCHS: ${{ inputs.epochs || 80 }}
        run: python train.py --universe fi --stream $STREAM --benchmark --epochs $EPOCHS
